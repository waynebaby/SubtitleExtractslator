name: Release Skill Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-release]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SubtitleExtractslator.sln

      - name: Build
        run: dotnet build SubtitleExtractslator.sln -c Release --no-restore

      - name: Test
        run: dotnet test SubtitleExtractslator.sln -c Release --no-build

      - name: Resolve bump type from associated PR labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let bump = 'patch';
            let prNumber = '';

            if (context.eventName === 'push') {
              const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha,
              });

              if (result.data.length > 0) {
                const pr = result.data[0];
                prNumber = String(pr.number);
                const labels = pr.labels.map((l) => String(l.name).toLowerCase());

                const hasAny = (candidates) => candidates.some((name) => labels.includes(name));
                if (hasAny(['major', 'semver:major', 'release:major'])) {
                  bump = 'major';
                } else if (hasAny(['minor', 'semver:minor', 'release:minor'])) {
                  bump = 'minor';
                } else {
                  bump = 'patch';
                }
              }
            }

            core.setOutput('bump', bump);
            core.setOutput('pr_number', prNumber);

      - name: Compute release version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --force

          $skillPath = "subtitle-extractslator/SKILL.md"
          if (-not (Test-Path $skillPath)) {
            throw "Skill file not found: $skillPath"
          }

          $skillRaw = Get-Content $skillPath -Raw
          $skillVersionMatch = [regex]::Match($skillRaw, "(?m)^\s*version:\s*([0-9]+\.[0-9]+\.[0-9]+)\s*$")
          if (-not $skillVersionMatch.Success) {
            throw "Unable to read metadata.version from $skillPath"
          }

          $skillVersion = $skillVersionMatch.Groups[1].Value
          $latestTag = (git tag --list 'v*' --sort=-v:refname | Select-Object -First 1)
          $bump = "${{ steps.bump.outputs.bump }}"

          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            $nextVersion = $skillVersion
          }
          else {
            $base = $latestTag.TrimStart('v')
            $parts = $base.Split('.')
            if ($parts.Count -ne 3) {
              throw "Latest tag '$latestTag' is not a semver tag (vX.Y.Z)."
            }

            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]

            switch ($bump) {
              "major" {
                $major += 1
                $minor = 0
                $patch = 0
              }
              "minor" {
                $minor += 1
                $patch = 0
              }
              default {
                $patch += 1
              }
            }

            $nextVersion = "$major.$minor.$patch"
          }

          $tag = "v$nextVersion"
          $zipNameWin = "subtitle-extractslator-$tag-win-x64.zip"
          $zipNameLinux = "subtitle-extractslator-$tag-linux-x64.zip"
          $zipNameOsx = "subtitle-extractslator-$tag-osx-arm64.zip"
          $releaseAssetUrlWin = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipNameWin"
          $releaseAssetUrlLinux = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipNameLinux"
          $releaseAssetUrlOsx = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipNameOsx"
          $releasesHome = "https://github.com/${{ github.repository }}/releases"

          "version=$nextVersion" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip_name_win=$zipNameWin" >> $env:GITHUB_OUTPUT
          "zip_name_linux=$zipNameLinux" >> $env:GITHUB_OUTPUT
          "zip_name_osx=$zipNameOsx" >> $env:GITHUB_OUTPUT
          "release_asset_url_win=$releaseAssetUrlWin" >> $env:GITHUB_OUTPUT
          "release_asset_url_linux=$releaseAssetUrlLinux" >> $env:GITHUB_OUTPUT
          "release_asset_url_osx=$releaseAssetUrlOsx" >> $env:GITHUB_OUTPUT
          "releases_home=$releasesHome" >> $env:GITHUB_OUTPUT

      - name: Update SKILL metadata.version and README release links
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $zipNameWin = "${{ steps.version.outputs.zip_name_win }}"
          $zipNameLinux = "${{ steps.version.outputs.zip_name_linux }}"
          $zipNameOsx = "${{ steps.version.outputs.zip_name_osx }}"
          $assetUrlWin = "${{ steps.version.outputs.release_asset_url_win }}"
          $assetUrlLinux = "${{ steps.version.outputs.release_asset_url_linux }}"
          $assetUrlOsx = "${{ steps.version.outputs.release_asset_url_osx }}"
          $releasesHome = "${{ steps.version.outputs.releases_home }}"

          $skillPath = "subtitle-extractslator/SKILL.md"
          $skillRaw = Get-Content $skillPath -Raw
          $skillRaw = [regex]::Replace($skillRaw, "(?m)^(\s*version:\s*)([0-9]+\.[0-9]+\.[0-9]+)\s*$", ('${1}' + $version))
          Set-Content -Path $skillPath -Value $skillRaw -Encoding utf8

          $readmeEnPath = "README.md"
          $enBlock = @(
            "<!-- release-links:start -->",
            "- Latest releases: [Releases]($releasesHome)",
            "- Windows package ($tag): [$zipNameWin]($assetUrlWin)",
            "- Linux package ($tag): [$zipNameLinux]($assetUrlLinux)",
            "- macOS package ($tag): [$zipNameOsx]($assetUrlOsx)",
            "<!-- release-links:end -->"
          ) -join "`n"
          $enRaw = Get-Content $readmeEnPath -Raw
          if ($enRaw -notmatch "<!-- release-links:start -->") {
            throw "Missing release-links marker in $readmeEnPath"
          }
          $enRaw = [regex]::Replace($enRaw, "(?s)<!-- release-links:start -->.*?<!-- release-links:end -->", $enBlock)
          Set-Content -Path $readmeEnPath -Value $enRaw -Encoding utf8

          $readmeZhPath = "README.zh-CN.md"
          $zhBlock = @(
            "<!-- release-links:start -->",
            "- Release 总入口：[Releases]($releasesHome)",
            "- Windows 包（$tag）：[$zipNameWin]($assetUrlWin)",
            "- Linux 包（$tag）：[$zipNameLinux]($assetUrlLinux)",
            "- macOS 包（$tag）：[$zipNameOsx]($assetUrlOsx)",
            "<!-- release-links:end -->"
          ) -join "`n"
          $zhRaw = Get-Content $readmeZhPath -Raw
          if ($zhRaw -notmatch "<!-- release-links:start -->") {
            throw "Missing release-links marker in $readmeZhPath"
          }
          $zhRaw = [regex]::Replace($zhRaw, "(?s)<!-- release-links:start -->.*?<!-- release-links:end -->", $zhBlock)
          Set-Content -Path $readmeZhPath -Value $zhRaw -Encoding utf8

      - name: Build all platform binaries
        shell: pwsh
        run: |
          $binRoot = Join-Path $env:RUNNER_TEMP "skill-bin-all"
          New-Item -ItemType Directory -Path $binRoot -Force | Out-Null

          ./scripts/publish-skill-binaries.ps1 -OutputRoot $binRoot -Configuration Release

      - name: Pack OS-specific skill zips
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $zipNameWin = "${{ steps.version.outputs.zip_name_win }}"
          $zipNameLinux = "${{ steps.version.outputs.zip_name_linux }}"
          $zipNameOsx = "${{ steps.version.outputs.zip_name_osx }}"
          $binRoot = Join-Path $env:RUNNER_TEMP "skill-bin-all"
          $packageRoot = Join-Path $env:RUNNER_TEMP "skill-package"

          $targets = @(
            @{ Rid = "win-x64"; Binary = "SubtitleExtractslator.Cli.exe"; Zip = $zipNameWin },
            @{ Rid = "linux-x64"; Binary = "SubtitleExtractslator.Cli"; Zip = $zipNameLinux },
            @{ Rid = "osx-arm64"; Binary = "SubtitleExtractslator.Cli"; Zip = $zipNameOsx }
          )

          foreach ($target in $targets) {
            $rid = $target.Rid
            $binaryName = $target.Binary
            $zipName = $target.Zip
            $binaryPath = Join-Path (Join-Path $binRoot $rid) $binaryName

            if (-not (Test-Path $binaryPath)) {
              throw "Expected binary not found for $rid: $binaryPath"
            }

            $stagingSkillRoot = Join-Path $packageRoot "subtitle-extractslator-$rid"
            $skillRootInZip = Join-Path $stagingSkillRoot "subtitle-extractslator"
            $referencesDir = Join-Path $skillRootInZip "references"
            $ridBinDir = Join-Path (Join-Path $skillRootInZip "assets/bin") $rid

            if (Test-Path $stagingSkillRoot) {
              Remove-Item $stagingSkillRoot -Recurse -Force
            }

            New-Item -ItemType Directory -Path $referencesDir -Force | Out-Null
            New-Item -ItemType Directory -Path $ridBinDir -Force | Out-Null

            Copy-Item "subtitle-extractslator/SKILL.md" (Join-Path $skillRootInZip "SKILL.md") -Force
            Copy-Item "subtitle-extractslator/references/*" $referencesDir -Recurse -Force
            Copy-Item $binaryPath (Join-Path $ridBinDir $binaryName) -Force

            $zipPath = Join-Path $env:RUNNER_TEMP $zipName
            if (Test-Path $zipPath) {
              Remove-Item $zipPath -Force
            }

            Compress-Archive -Path $skillRootInZip -DestinationPath $zipPath -Force
          }

      - name: Commit version and README updates
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $branch = "${{ github.ref_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add subtitle-extractslator/SKILL.md README.md README.zh-CN.md

          if (-not (git diff --cached --quiet)) {
            git commit -m "chore(release): update metadata and release links for $tag [skip-release]"
            git push origin "HEAD:$branch"
          }

      - name: Ensure release tag exists
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          git fetch --tags --force

          $existsRemote = $false
          $remote = git ls-remote --tags origin "refs/tags/$tag"
          if (-not [string]::IsNullOrWhiteSpace($remote)) {
            $existsRemote = $true
          }

          if ($existsRemote) {
            Write-Host "Tag $tag already exists on origin. Skipping tag creation."
            exit 0
          }

          $existsLocally = $false
          try {
            git rev-parse --verify "refs/tags/$tag" *> $null
            if ($LASTEXITCODE -eq 0) {
              $existsLocally = $true
            }
          }
          catch {
            $existsLocally = $false
          }

          if (-not $existsLocally) {
            git tag $tag
            git push origin $tag
          }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SubtitleExtractslator ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: false
          files: |
            ${{ runner.temp }}/${{ steps.version.outputs.zip_name_win }}
            ${{ runner.temp }}/${{ steps.version.outputs.zip_name_linux }}
            ${{ runner.temp }}/${{ steps.version.outputs.zip_name_osx }}
